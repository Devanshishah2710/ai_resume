name: opencode

# Trigger opencode from GitHub comments.
#   - Issue comments           → triage / explain / fix
#   - PR review comments       → targeted code changes
# Mention /oc or /opencode in a comment to invoke the agent.
# opencode reads the thread context and replies back in the same issue/PR.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  opencode:
    # Only run when the comment explicitly invokes opencode.
    if: |
      (
        github.event_name == 'issue_comment' &&
        (
          contains(github.event.comment.body, '/oc') ||
          contains(github.event.comment.body, '/opencode')
        )
      ) || (
        github.event_name == 'pull_request_review_comment' &&
        (
          contains(github.event.comment.body, '/oc') ||
          contains(github.event.comment.body, '/opencode')
        )
      )

    runs-on: ubuntu-latest

    steps:
      # Skip our own comments to prevent infinite trigger loops.
      - name: Guard against bot self-trigger
        if: github.actor == 'github-actions[bot]'
        run: exit 0

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          model: google/gemini-2.5-flash
